# CI/CD pipeline for npm-check
#
# Flow:  test  →  build  →  publish (manual approval, default branch only)
#
#   test     lint + unit tests on every push/MR
#   build    `npm pack` the publishable tarball, kept as a job artifact
#   publish  manual gate that pushes the built tarball to the private registry
#
# Required CI/CD variables (Settings → CI/CD → Variables), set as "Protected"
# and "Masked" so they're only exposed to protected branches:
#   REGISTRY_URL   e.g. https://dependably.northwardlabs.ca/
#   REGISTRY_KEY   auth token for that registry  (npm `_authToken`)

default:
  image: node:20

stages:
  - test
  - build
  - publish

# Reusable npm dependency cache (keyed on the lockfile).
.npm_install: &npm_install
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

lint:
  stage: test
  <<: *npm_install
  script:
    - npm run lint

unit-tests:
  stage: test
  <<: *npm_install
  script:
    - npm run test:unit
  # Integration tests (tests/integration) are Docker-based and run `npm ci`
  # against the live registry across npm versions — run them on demand with
  # `npm run test:integration` in a docker-in-docker job rather than here.

# Secret scan — fail the pipeline if a committed secret is detected. Pinned by
# digest so the scanner version can't drift under us. GIT_DEPTH: 0 fetches full
# history; on an MR/push the incremental range (CI_COMMIT_BEFORE_SHA..HEAD) is
# scanned, --only-verified keeps it fast and false-positive-free, --fail makes a
# verified finding a hard failure.
secret-scan:
  stage: test
  image:
    name: trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
  script:
    - trufflehog git file://. --since-commit "${CI_COMMIT_BEFORE_SHA:-HEAD~1}" --only-verified --fail

build:
  stage: build
  script:
    # Pure-ESM package: no transpile step, so "build" is just packing the
    # publishable tarball. `npm pack` honors the package.json `files` allowlist.
    - npm pack
  artifacts:
    paths:
      - "*.tgz"
    expire_in: 1 week

publish:
  stage: publish
  # Only the build artifact is needed — no source install, and publishing a
  # prebuilt tarball deliberately skips `prepublishOnly` (which re-runs the
  # full suite). The `test` stage above is the authoritative quality gate.
  dependencies:
    - build
  # Manual approval, default branch only. Serialize so two publishes can't race.
  resource_group: publish
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
  script:
    - |
      if [ -z "$REGISTRY_URL" ] || [ -z "$REGISTRY_KEY" ]; then
        echo "ERROR: REGISTRY_URL and REGISTRY_KEY must be set as CI/CD variables." >&2
        exit 1
      fi
    # Derive the registry host (strip scheme + trailing slash) for the auth key.
    - REGISTRY_HOST=$(printf '%s' "$REGISTRY_URL" | sed -E 's#^https?://##; s#/+$##')
    - |
      {
        echo "registry=$REGISTRY_URL"
        echo "//$REGISTRY_HOST/:_authToken=$REGISTRY_KEY"
        echo "always-auth=true"
      } > .npmrc
    - TARBALL=$(ls ./*.tgz)
    - PKG=$(node -p "const p=require('./package.json'); p.name + '@' + p.version")
    - echo "Publishing $TARBALL ($PKG) to $REGISTRY_URL"
    # Publishing fails if this version already exists — bump the version to release.
    # On failure, dump npm's debug log (silly-level, includes the registry's HTTP
    # response body) so the actual rejection reason — e.g. a 422 ProblemDetails
    # "detail" — is visible in the job output. npm prints the log path in its error;
    # parse that, and fall back to scanning the standard log dirs.
    - |
      if ! npm publish "$TARBALL" --registry "$REGISTRY_URL" --loglevel verbose 2> publish.err; then
        cat publish.err >&2
        echo "=== registry response (npm debug log) ===" >&2
        LOG=$(grep -oE '/[^ ]+_logs/[0-9TZ_-]+-debug-[0-9]+\.log' publish.err | tail -1)
        for f in "$LOG" /root/.npm/_logs/*-debug-*.log "$HOME"/.npm/_logs/*-debug-*.log; do
          [ -n "$f" ] && [ -f "$f" ] && { echo "--- $f ---" >&2; cat "$f" >&2; break; }
        done
        exit 1
      fi
      cat publish.err >&2
    # Verify the version is actually retrievable from the registry. A plain
    # `npm publish` success can be a false positive against a non-registry
    # endpoint (e.g. an SPA that 200s the PUT); this read-back fails the job
    # unless the package is genuinely live.
    - echo "Verifying $PKG is live on the registry…"
    - npm view "$PKG" version --registry "$REGISTRY_URL"
    - echo "✓ $PKG published and verified on $REGISTRY_URL"
  after_script:
    - rm -f .npmrc
