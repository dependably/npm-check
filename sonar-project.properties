# SonarQube analysis configuration for npm-check.
#
# Non-secret structural settings live here. The secret/per-environment values
# (sonar.host.url, the auth token, sonar.projectVersion) are passed on the command
# line by the `sonarqube-check` CI job. The project key defaults below and is
# overridden by $SONAR_PROJECT_KEY only when that CI variable is set.

# Default project key. The CI job overrides it with $SONAR_PROJECT_KEY when that
# variable is set, so a server-assigned key can take precedence without edits here.
sonar.projectKey=moonlitlabs_npm-check
sonar.projectName=npm-check

# Production code under analysis. Tests are declared separately so Sonar scopes
# coverage and issue rules correctly.
sonar.sources=src,bin
sonar.tests=tests

# Jest emits lcov at coverage/lcov.info (default reporter set).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep generated/vendored trees out of analysis.
sonar.exclusions=node_modules/**,coverage/**,.npm/**
sonar.coverage.exclusions=bin/**,tests/**

sonar.sourceEncoding=UTF-8
