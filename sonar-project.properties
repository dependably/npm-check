# SonarQube analysis configuration for npm-check.
#
# Non-secret structural settings live here; the per-environment values
# (sonar.projectKey, sonar.host.url, the auth token, sonar.projectVersion)
# are passed on the command line by the `sonarqube-check` CI job so they can
# come from masked/protected CI/CD variables.

sonar.projectName=npm-check

# Production code under analysis. Tests are declared separately so Sonar scopes
# coverage and issue rules correctly.
sonar.sources=src,bin
sonar.tests=tests

# Jest emits lcov at coverage/lcov.info (default reporter set).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep generated/vendored trees out of analysis.
sonar.exclusions=node_modules/**,coverage/**,.npm/**
sonar.coverage.exclusions=bin/**,tests/**

sonar.sourceEncoding=UTF-8
