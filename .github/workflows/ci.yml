# CI for the public GitHub mirror (https://github.com/dependably/npm-check).
#
# GitLab (gitlab.northwardlabs.ca/moonlitlabs/npm-check) stays the source of
# truth and runs the authoritative pipeline (.gitlab-ci.yml: lint, tests, SBOM,
# private-registry publish). This workflow is the CI that runs *on GitHub* once
# the GitLab `publish-github` manual job mirrors the branch here. It deliberately
# uses the PUBLIC npm registry only — no private registry, no secrets required —
# so it works for forks and external contributors out of the box.
#
# Jobs:  secret-scan (trufflehog)  ·  lint  ·  test (matrix)  ·  build (npm pack)
#        release (tags v* only — creates a GitHub Release + attaches the .tgz +
#                 SLSA build provenance, L2; npm publish when NPM_TOKEN is set)
#
# Action pins: third-party/marketplace steps are intended to be pinned by commit
# SHA for supply-chain safety. The official GitHub-maintained actions below use
# `@v5` major tags (Node 24 runtime — `@v4` ran on the now-deprecated Node 20);
# tighten to SHAs when convenient.

name: CI

on:
  push:
    branches: [main]
    # A release is cut by pushing a `v*` tag — the `release` job below then creates
    # the GitHub Release, attaches the packed tarball, and emits SLSA provenance.
    # This mirrors the nuget-check pipeline (tag-driven, self-creating release).
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (mirrors the GitLab auto-cancel policy).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Secret scan — fail the build if a committed secret is detected. We run the
  # SAME trufflehog image pinned by digest as the GitLab `secret-scan` job, for
  # parity and so the scanner version can't drift. fetch-depth: 0 gives a full
  # history scan; --only-verified keeps it fast and false-positive-free; --fail
  # hard-fails on a finding.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: TruffleHog (full-history, verified secrets only)
        run: |
          docker run --rm -v "$PWD:/repo" \
            trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a \
            git file:///repo --only-verified --fail

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint

  # Unit tests across the supported Node range (package.json engines: >=22) — the
  # two current LTS lines. 18 and 20 are end-of-life and dropped.
  # Integration tests are Docker/registry-based and stay on-demand, matching the
  # GitLab pipeline (which also runs only unit tests inline).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  # "Build" is just packing the publishable tarball — this is a pure-ESM package
  # with no transpile step. npm pack honors the package.json `files` allowlist.
  # Gated behind lint + test so we never publish an artifact from a red build.
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm pack
      - uses: actions/upload-artifact@v5
        with:
          name: npm-tarball
          path: "*.tgz"
          retention-days: 7

  # Release the npm package with a signed SLSA build provenance — SLSA Build L2.
  # Tag-driven and self-creating, mirroring the nuget-check `release` job: pushing
  # a `v*` tag creates the GitHub Release, attaches the packed tarball, and signs
  # it — so the released artifact is visible and verifiable on GitHub itself.
  #
  # TWO complementary signatures are produced, because npm and the GitHub
  # attestation store surface provenance in DIFFERENT places:
  #
  #   1. actions/attest-build-provenance signs the packed *.tgz and stores the
  #      attestation in GitHub (repo "Attestations" tab; verify with
  #      `gh attestation verify <tarball> -R dependably/npm-check`). This is the
  #      SAME mechanism the NuGet pipeline uses, so it produces a signed release
  #      regardless of which registry the tarball is pushed to (incl. private).
  #
  #   2. `npm publish --provenance` additionally records sigstore provenance on
  #      the npmjs package page (verify with `npm audit signatures`). This works
  #      ONLY against the PUBLIC registry (registry.npmjs.org) — private/third-
  #      party registries do not support npm provenance, so this is the public-npm
  #      bonus on top of the registry-independent GitHub attestation above.
  #
  # We `npm pack` ONCE and attest + release + publish the same bytes, so the
  # attestation matches the released artifact exactly. The attest + GitHub Release
  # steps run independently of npm publish, so the signed GitHub Release is produced
  # even when NPM_TOKEN is unset — npm publish is skipped (not failed) until then.
  #
  # Runs only on a `v*` tag, after the gating jobs pass. Keyless: id-token: write
  # drives the OIDC->sigstore signature; NODE_AUTH_TOKEN is registry auth only, not
  # a key. --access public is required for the scoped @dependably/* name. Prereq for
  # npm publish: NPM_TOKEN repo secret; npm >= 9.5 for provenance (Node 24 ships npm 11).
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [secret-scan, lint, test, build]
    permissions:
      contents: write      # create the GitHub Release + upload the .tgz asset
      id-token: write      # OIDC -> sigstore signature (GitHub attestation + npm provenance)
      attestations: write  # store the GitHub build-provenance attestation on the repo
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # Pack the exact tarball we attest, release, and publish (one set of bytes).
      - run: npm pack
      # NuGet-equivalent: signed GitHub attestation over the tarball, registry-
      # independent. SHA-pin this action when convenient (see header note).
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "*.tgz"
      # Public-npm provenance bonus; publishes the same packed tarball. Skipped
      # (not failed) until NPM_TOKEN is set, so the GitHub Release + provenance
      # still produce on the first tagged run.
      - name: Publish to npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -eu
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set — skipping npm publish (GitHub Release + provenance still produced)."
            exit 0
          fi
          npm publish *.tgz --provenance --access public
      # Attach the attested .tgz to a GitHub Release so the exact signed bytes are
      # downloadable and verifiable by digest — the artifact you see on GitHub.
      - name: Publish .tgz to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          gh release create "$GITHUB_REF_NAME" *.tgz \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" *.tgz --clobber
