# CI for the public GitHub mirror (https://github.com/dependably/npm-check).
#
# GitLab (gitlab.northwardlabs.ca/moonlitlabs/npm-check) stays the source of
# truth and runs the authoritative pipeline (.gitlab-ci.yml: lint, tests, SBOM,
# private-registry publish). This workflow is the CI that runs *on GitHub* once
# the GitLab `publish-github` manual job mirrors the branch here. It deliberately
# uses the PUBLIC npm registry only — no private registry, no secrets required —
# so it works for forks and external contributors out of the box.
#
# Jobs:  secret-scan (trufflehog)  ·  lint  ·  test (matrix)  ·  build (npm pack)
#        publish-npm (release only — public npm + SLSA build provenance, L2)
#
# Action pins: third-party/marketplace steps are intended to be pinned by commit
# SHA for supply-chain safety. The official GitHub-maintained actions below use
# `@v5` major tags (Node 24 runtime — `@v4` ran on the now-deprecated Node 20);
# tighten to SHAs when convenient.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Publishing is gated on a GitHub Release being published (cut from a tag),
  # never on a plain push — so a release is a deliberate, reviewable act.
  release:
    types: [published]

# Cancel superseded runs on the same ref (mirrors the GitLab auto-cancel policy).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Secret scan — fail the build if a committed secret is detected. We run the
  # SAME trufflehog image pinned by digest as the GitLab `secret-scan` job, for
  # parity and so the scanner version can't drift. fetch-depth: 0 gives a full
  # history scan; --only-verified keeps it fast and false-positive-free; --fail
  # hard-fails on a finding.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: TruffleHog (full-history, verified secrets only)
        run: |
          docker run --rm -v "$PWD:/repo" \
            trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a \
            git file:///repo --only-verified --fail

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint

  # Unit tests across the supported Node range (package.json engines: >=22) — the
  # two current LTS lines. 18 and 20 are end-of-life and dropped.
  # Integration tests are Docker/registry-based and stay on-demand, matching the
  # GitLab pipeline (which also runs only unit tests inline).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  # "Build" is just packing the publishable tarball — this is a pure-ESM package
  # with no transpile step. npm pack honors the package.json `files` allowlist.
  # Gated behind lint + test so we never publish an artifact from a red build.
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: "*.tgz"
          retention-days: 7

  # Publish to the PUBLIC npm registry with SLSA build provenance — SLSA Build L2.
  # Runs only when a GitHub Release is published (see the `release` trigger above),
  # so it never fires on a branch push or PR. `npm publish --provenance` makes npm
  # generate a sigstore-signed SLSA provenance statement from THIS workflow's OIDC
  # identity (that's what `id-token: write` is for) and link it on the package's npm
  # page — keyless, no signing secret to manage or leak. NODE_AUTH_TOKEN is only the
  # registry auth token (an npm automation/granular token), not a signing key.
  #
  # Quality gate: `npm publish` runs the package.json `prepublishOnly` script
  # (test + lint) from the checked-out source before anything is pushed, so a red
  # build cannot ship. `--access public` is required because the package is scoped
  # (@dependably/*), which npm defaults to restricted.
  #
  # Prereq: add an npm token as the `NPM_TOKEN` repo secret. Provenance also needs
  # npm >= 9.5 — Node 24 ships npm 11, so the version below satisfies it.
  publish-npm:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    permissions:
      contents: read       # checkout
      id-token: write      # OIDC -> sigstore signature for provenance (keyless)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
